name: Actualizar tipo de cambio CLP/USD

on:
  schedule:
    # 8am hora Chile (UTC-3 standard / UTC-4 summer) → 11am UTC cubre ambos casos
    - cron: '0 11 * * *'
  workflow_dispatch: # permite correr manualmente desde GitHub

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Actualizar tipo de cambio
        env:
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: node scripts/update-rate.js
